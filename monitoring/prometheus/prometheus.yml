global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'veyron-backend'
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:3001']
    # Décommenter si le backend expose un endpoint /metrics
    # sinon ce job restera en état "down" sans impact
